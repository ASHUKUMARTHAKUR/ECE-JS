<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
 
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <h2>Experiment 2: Employee Record System</h2>

    
    <div class="control-panel">
        <input type="text" id="empName" placeholder="Employee Name">
        <input type="number" id="empId" placeholder="Employee ID">
        <input type="number" id="empSalary" placeholder="Salary (₹)">
        <select id="empDept">
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Sales">Sales</option>
            <option value="Management">Management</option>
        </select>
        <button onclick="addEmployee()">+ Add Employee</button>
    </div>

    
    <div class="actions">
        <button onclick="renderTable(employees)">Show All</button>
        <button class="secondary" onclick="filterHighSalary()">Filter > ₹50k</button>
        <button class="secondary" onclick="calcStats()">Calculate Stats</button>
        <button class="secondary" onclick="countDept()">Count by Dept</button>
    </div>

   
    <div class="stats-grid" id="statsPanel" style="display:none;">
        <div class="stat-card">
            <span class="stat-value" id="totalSalary">0</span>
            Total Payout
        </div>
        <div class="stat-card">
            <span class="stat-value" id="avgSalary">0</span>
            Average Salary
        </div>
        <div class="stat-card">
            <span class="stat-value" id="deptCounts">-</span>
            Dept Counts
        </div>
    </div>


    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary (₹)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
           
        </tbody>
    </table>

 
    <script src="script4.js"></script>
</body>
</html>
